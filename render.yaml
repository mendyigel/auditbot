databases:
  - name: auditbot-db
    plan: free
    databaseName: auditbot
    user: auditbot

services:
  - type: web
    name: auditbot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://orbiolab.com
      - key: DATABASE_URL
        fromDatabase:
          name: auditbot-db
          property: connectionString
    customDomains:
      - name: orbiolab.com
      - name: www.orbiolab.com
    autoDeploy: false
