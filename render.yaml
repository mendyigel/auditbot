services:
  - type: web
    name: auditbot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://orbiolab.com
    customDomains:
      - name: orbiolab.com
      - name: www.orbiolab.com
    disk:
      name: auditbot-data
      mountPath: /app/data
      sizeGB: 1
    autoDeploy: false
