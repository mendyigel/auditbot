<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="OrbioLabs icon">
  <defs>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A6BFF"/>
      <stop offset="100%" stop-color="#4D9FFF"/>
    </linearGradient>
  </defs>
  <!-- Outer arc — bottom-right sweep -->
  <path
